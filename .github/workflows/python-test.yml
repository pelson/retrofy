name: python-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for setuptools-scm

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install build dependencies
      run: |
        python -m pip install build

    - name: Build wheel and sdist
      run: python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  test:
    needs: build
    strategy:
      matrix:
        include:
          - python-version: "3.9"
            os: ubuntu-latest
          - python-version: "3.10"
            os: ubuntu-latest
          - python-version: "3.11"
            os: ubuntu-latest
          - python-version: "3.12"
            os: ubuntu-latest
          - python-version: "3.13"
            os: ubuntu-latest
          - python-version: "3.14"
            os: ubuntu-latest
            prerelease: true
          - python-version: "3.15"
            os: ubuntu-latest
            prerelease: true

    runs-on: ${{ matrix.os }}

    env:
      # libcst (a retrofy runtime dep) builds a native extension via
      # PyO3. PyO3 0.26 caps at Python 3.14, so building from sdist on
      # 3.15 fails unless we opt in to the stable-ABI forward-compat
      # path. Setting it unconditionally is a no-op for Pythons PyO3
      # already supports natively.
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: ${{ matrix.prerelease || false }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Stand up a merged local+PyPI index serving the dev retrofy
      run: |
        # Every pip in the rest of this job needs to resolve ``retrofy``
        # to the dev wheel we built (the artefact in ``dist/``) rather
        # than the released ``retrofy`` on PyPI. Pip only accepts one
        # index URL plus optional ``--extra-index-url`` /
        # ``--find-links`` fallbacks, and none of those let us *prefer*
        # local files over an index that also has the package. Even
        # ``--pre`` is a global policy switch rather than a per-package
        # one. Without a dedicated index, the build-isolation environment
        # silently picks the latest stable retrofy from PyPI; on Python
        # 3.15-beta this leaks into example-project's build via the
        # entry-point lookup and fails on PEP 810 syntax the released
        # retrofy doesn't yet know how to convert.
        #
        # Stand up a tiny ``simple-repository-server`` in the background
        # that serves the local dev retrofy from ``dist/`` and proxies
        # PyPI for everything else, then point pip at it via
        # ``PIP_INDEX_URL`` for the rest of the job. The merge is
        # priority-ordered: queries for ``retrofy`` are answered by the
        # local directory (dev wheel only); queries for anything else
        # fall through to PyPI.
        python -m pip install --upgrade pip

        # simple-repository-server itself needs Python >=3.11, but the
        # test matrix covers Python 3.9+. Run the server out-of-band on
        # an interpreter uv provisions for us — independent of the
        # matrix Python that the rest of the job uses.
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
        uv --version

        # simple-repository-server's local component requires a
        # ``<root>/<canonical-name>/`` directory layout and refuses
        # files that resolve outside the root (so symlinks won't do).
        LOCAL_IDX=/tmp/retrofy-local-srs
        mkdir -p "$LOCAL_IDX/retrofy"
        cp dist/* "$LOCAL_IDX/retrofy/"

        # Background server; the runner cleans it up at job end. uv
        # ensures a 3.13 interpreter is available even when the matrix
        # job is on an older Python.
        nohup uv run --no-project --python 3.13 \
          --with simple-repository-server \
          -- simple-repository-server \
          --host 127.0.0.1 --port 18900 \
          "$LOCAL_IDX" https://pypi.org/simple/ \
          > /tmp/retrofy-srs.log 2>&1 &
        for _ in $(seq 1 30); do
          curl -fsS http://127.0.0.1:18900/simple/retrofy/ -o /dev/null \
            && break
          sleep 1
        done
        if ! curl -fsS http://127.0.0.1:18900/simple/retrofy/ -o /dev/null; then
          echo "::error::simple-repository-server failed to come up"
          cat /tmp/retrofy-srs.log
          exit 1
        fi

        # Persist for subsequent steps in this job.
        echo "PIP_INDEX_URL=http://127.0.0.1:18900/simple/" >> "$GITHUB_ENV"
        echo "Local retrofy index live at http://127.0.0.1:18900/simple/"

    - name: Install the retrofy wheel
      run: |
        # ``PIP_INDEX_URL`` (set in the previous step) points pip at the
        # local merged index, so this resolves ``retrofy`` to the dev
        # wheel and ``pytest`` to PyPI's release — no ``--find-links``,
        # no ``--pre``, no path-based install.
        python -m pip install pytest retrofy

    - name: Test with pytest (isolated from source)
      run: |
        # Run tests from a different directory to ensure we're testing the installed package
        mkdir -p not-the-source
        cd not-the-source
        python -m pytest --pyargs retrofy -ssvv

    - name: Build example-project (exercises the retrofy build rewrite)
      run: |
        # Build with pip's build isolation (mirrors how end users build
        # a retrofy project). The build-isolation env's pip resolves
        # the build-system requires from pyproject (which includes
        # ``retrofy``); we pin it to the dev version built earlier via
        # pip's ``--build-constraint`` (env var
        # ``PIP_BUILD_CONSTRAINT``, added in pip 25.3) so the constraint
        # applies ONLY in the build env and not in any runtime install
        # downstream. Without the pin pip would either fail (released
        # retrofy missing the changes under test) or silently pick the
        # wrong one.
        RETROFY_WHL=$(ls dist/retrofy-*-py3-none-any.whl)
        RETROFY_VERSION=$(basename "$RETROFY_WHL" \
          | sed -E 's/^retrofy-(.+)-py3-none-any\.whl$/\1/')
        echo "retrofy==${RETROFY_VERSION}" > /tmp/retrofy-build-constraint.txt

        python -m pip install --upgrade 'pip>=25.3'
        mkdir -p example-project/dist
        # Use ``pip wheel`` rather than ``python -m build`` so the
        # build-isolation env is set up by the outer pip (which is
        # 25.3+ and so honours ``PIP_BUILD_CONSTRAINT``).
        # ``python -m build`` instead creates a fresh venv with
        # ensurepip's bundled pip, which is too old to recognise the
        # build-constraint and silently ignores the pin.
        PIP_FIND_LINKS="${{ github.workspace }}/dist" \
        PIP_BUILD_CONSTRAINT=/tmp/retrofy-build-constraint.txt \
        PIP_VERBOSE=1 \
          python -m pip wheel ./example-project --no-deps \
            --wheel-dir example-project/dist 2>&1 | tee /tmp/build.log

        # Belt-and-braces: confirm the build-isolation env actually
        # installed the dev retrofy we pinned (the pin would have made
        # pip fail outright if it couldn't satisfy it, but log the wheel
        # path explicitly for auditability).
        if ! grep -F "retrofy-${RETROFY_VERSION}-py3-none-any.whl" /tmp/build.log >/dev/null; then
          echo "::error::dev retrofy ${RETROFY_VERSION} wheel was not referenced in the build-isolation env"
          exit 1
        fi
        echo "Confirmed dev retrofy ${RETROFY_VERSION} was used in the build env"

    - name: Install built example-project wheel in a fresh venv
      run: |
        # Validate the wheel-install path honestly: a fresh venv with
        # neither retrofy nor its transitive deps (libcst etc.). The
        # build-time rewrite (``compatibility_via_rewrite``) bakes the
        # converted source into the wheel, so a wheel install should
        # never need retrofy at runtime. Any future converter that
        # wants a runtime helper has to be designed so the converted
        # output does not import retrofy — keeping wheel installs
        # retrofy-free is an invariant of the project, not a temporary
        # state.
        python -m venv /tmp/wheel-venv
        /tmp/wheel-venv/bin/pip install --upgrade pip
        /tmp/wheel-venv/bin/pip install pytest
        /tmp/wheel-venv/bin/pip install example-project/dist/*.whl

        # The wheel-install path must not pull retrofy into the runtime
        # env (the build-time rewrite has already baked the converted
        # source into the wheel).
        if /tmp/wheel-venv/bin/pip list --format=freeze | grep -qE '^retrofy=='; then
          echo "::error::retrofy unexpectedly installed in /tmp/wheel-venv"
          /tmp/wheel-venv/bin/pip list --format=freeze | grep -E '^retrofy'
          exit 1
        fi
        echo "Confirmed retrofy is NOT installed in /tmp/wheel-venv"

    - name: Test example-project from isolation (wheel install)
      run: |
        cd not-the-source
        /tmp/wheel-venv/bin/pytest --pyargs example_project -ssvv

    - name: Install example-project as editable in a fresh venv
      run: |
        # Validate the editable install path end-to-end from a clean
        # slate: a fresh venv with no retrofy pre-installed. The
        # editable build triggers retrofy's
        # ``compatibility_via_import_hook`` which writes a ``.pth``
        # script registering the meta-path converter at Python startup.
        # Unlike wheel installs, editable installs run the user's
        # source through retrofy's meta-path loader at import time, so
        # retrofy itself must be importable at runtime.
        #
        # retrofy declares ``Requires-Dist: retrofy`` from
        # ``prepare_metadata_for_build_editable`` (via the
        # multistage-build hook of the same name), so pip resolves it
        # and pulls it into the runtime env automatically. We then
        # constrain pip to install the dev retrofy wheel (built earlier
        # in this workflow) rather than the released version from
        # PyPI, by adding it to ``--find-links`` and pinning it via a
        # runtime constraint.
        python -m venv /tmp/editable-venv
        /tmp/editable-venv/bin/pip install --upgrade 'pip>=25.3'
        /tmp/editable-venv/bin/pip install pytest

        # Use the same dev retrofy at both build- and run-time.
        export PIP_FIND_LINKS="${{ github.workspace }}/dist"
        export PIP_BUILD_CONSTRAINT=/tmp/retrofy-build-constraint.txt
        /tmp/editable-venv/bin/pip install \
          --editable example-project/ \
          --constraint /tmp/retrofy-build-constraint.txt

        # The editable install path MUST pull retrofy as a runtime dep
        # (retrofy's import-time rewriter runs against the user's
        # source on each import, so retrofy must be importable). If
        # this assertion ever flips, the multistage-build hook chain
        # has regressed.
        if ! /tmp/editable-venv/bin/pip list --format=freeze | grep -qE '^retrofy=='; then
          echo "::error::editable install did not pull retrofy as a runtime dep — multistage-build post-prepare-metadata-for-build-editable hook likely regressed"
          /tmp/editable-venv/bin/pip list --format=freeze
          exit 1
        fi
        INSTALLED_RETROFY=$(/tmp/editable-venv/bin/pip list --format=freeze | grep -E '^retrofy==' | head -n1)
        echo "Confirmed editable install pulled ${INSTALLED_RETROFY}"

    - name: Test example-project from isolation (editable install)
      run: |
        cd not-the-source
        /tmp/editable-venv/bin/pytest --pyargs example_project -ssvv

    - name: Install example-project as editable with uv
      run: |
        # Mirror of the pip editable step, exercising uv's PEP 660
        # implementation. uv follows PEP 621 strictly: it will only
        # call the backend's ``prepare_metadata_for_build_editable``
        # hook (and thus see retrofy's spliced ``Requires-Dist``) when
        # the project declares ``dependencies`` in ``[project].dynamic``
        # — which example-project does. If uv ever stops calling the
        # backend hook, or if example-project drops the ``dynamic``
        # declaration, this step regresses and the retrofy assertion
        # below fails.
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$HOME/.local/bin:$PATH"
        uv --version

        uv venv --python ${{ matrix.python-version }} /tmp/editable-uv-venv

        # Feed uv the dev wheels for both build- and runtime resolution.
        export UV_FIND_LINKS="${{ github.workspace }}/dist"
        VIRTUAL_ENV=/tmp/editable-uv-venv uv pip install pytest
        VIRTUAL_ENV=/tmp/editable-uv-venv uv pip install \
          --editable example-project/ \
          --build-constraint /tmp/retrofy-build-constraint.txt \
          --constraint /tmp/retrofy-build-constraint.txt

        if ! VIRTUAL_ENV=/tmp/editable-uv-venv uv pip list --format=freeze \
            | grep -qE '^retrofy=='; then
          echo "::error::uv editable install did not pull retrofy as a runtime dep — uv may have stopped honouring prepare_metadata_for_build_editable, or example-project lost its 'dynamic = [\"dependencies\"]' declaration"
          VIRTUAL_ENV=/tmp/editable-uv-venv uv pip list --format=freeze
          exit 1
        fi
        INSTALLED_RETROFY=$(VIRTUAL_ENV=/tmp/editable-uv-venv uv pip list --format=freeze | grep -E '^retrofy==' | head -n1)
        echo "Confirmed uv editable install pulled ${INSTALLED_RETROFY}"

    - name: Test example-project from isolation (uv editable install)
      run: |
        cd not-the-source
        /tmp/editable-uv-venv/bin/pytest --pyargs example_project -ssvv

    - name: Run example-project tests via `uv run` (no-venv workflow)
      run: |
        # `uv run` is the modern uv UX: no explicit venv, uv manages
        # the project environment automatically. We run in
        # ``--no-project`` + ``--with-editable .`` mode rather than
        # full project mode because the latter would try to produce a
        # universal ``uv.lock`` across example-project's whole
        # ``requires-python`` range (>=3.7), which is unsatisfiable —
        # retrofy itself requires >=3.9, so editable installs simply
        # cannot resolve for Python 3.7 / 3.8 (non-editable wheel
        # installs of example-project still work on 3.7+). The
        # ``--no-project`` path resolves only for the active
        # interpreter and writes no lockfile.
        #
        # ``UV_BUILD_CONSTRAINT`` / ``UV_CONSTRAINT`` are NOT honoured by
        # ``uv run`` (only by ``uv pip install``), so we can't pin the
        # dev retrofy via constraint files. ``--prerelease=allow`` is
        # also not enough: it gates the build-env resolver inconsistently
        # across uv versions, and on its own can leave the runtime env
        # silently resolving stable retrofy from PyPI.
        #
        # Sidestep the resolver-policy ambiguity entirely by giving uv
        # a tiny PEP 503 ``file://`` index that contains ONLY the dev
        # retrofy. uv's default ``first-index`` strategy uses the first
        # index that knows the package, so any resolution of ``retrofy``
        # — in the build env or runtime env — is locked to the dev
        # wheel. PyPI is still the default index for everything else
        # (pytest, multistage-build, libcst, ...).
        #
        # Combined with retrofy's editable hook (which splices
        # ``Requires-Dist: retrofy==<build-env-version>`` into METADATA),
        # this leaves no ambiguity: build- and runtime-retrofy are
        # always the same dev wheel.
        export PATH="$HOME/.local/bin:$PATH"

        LOCAL_IDX=/tmp/retrofy-local-index
        rm -rf "$LOCAL_IDX"
        mkdir -p "$LOCAL_IDX/retrofy"
        ln -s "${{ github.workspace }}/dist/"retrofy-* "$LOCAL_IDX/retrofy/"
        {
          echo '<!DOCTYPE html><html><body>'
          for f in "$LOCAL_IDX/retrofy/"retrofy-*; do
            bn=$(basename "$f")
            echo "<a href=\"$bn\">$bn</a><br>"
          done
          echo '</body></html>'
        } > "$LOCAL_IDX/retrofy/index.html"
        echo '<!DOCTYPE html><html><body><a href="retrofy/">retrofy</a></body></html>' \
          > "$LOCAL_IDX/index.html"

        cd example-project
        uv run --no-project --python ${{ matrix.python-version }} \
            --default-index https://pypi.org/simple/ \
            --index "file://${LOCAL_IDX}/" \
            --with-editable . --with pytest \
            python -m pytest example_project -ssvv

  compatibility_test:
    strategy:
      matrix:
        include:
          # Since this is just running the tests on Python versions that aren't compatible with
          # retrofy, we don't need to run this against Python versions which are tested above.
          - python-version: "3.7"
            os: ubuntu-22.04
          - python-version: "3.8"
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: ${{ matrix.prerelease || false }}

    - name: Install pytest only
      run: |
        python -m pip install pytest libcst
        echo "__version__ = 'dev'" > ./retrofy/_version.py

    - name: Test compatibility without installing retrofy itself (since it may not be possible to install for older Python versions)
      run: |
        python -m pytest ./retrofy/tests/_transformations/test_match_statement.py -ssvv

  pre-commit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install pre-commit

    - name: pre-commit run
      run: pre-commit run -a

