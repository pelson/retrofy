repos:
  - repo: https://gitlab.cern.ch/pre-commit-hook-mirrors/pre-commit/mirrors-mypy
    rev: 'v1.18.2'
    hooks:
      - id: mypy
        additional_dependencies: ["types-mock"]
        # mypy doesn't parse PEP 810 ``lazy`` syntax; exclude files
        # that use it natively. Tracked at
        # https://github.com/pelson/retrofy/issues/32 — fix is to run
        # mypy under retrofy's own rewriter.
        exclude: '^(example-project/example_project/tests/test_lazy_imports\.py|example-project/example_project/typed_lazy\.py|retrofy/_meta_hook_converter\.py|retrofy/_setup_editable\.py)$'
  - repo: https://gitlab.cern.ch/pre-commit-hook-mirrors/pre-commit/pre-commit-hooks
    rev: "v4.0.1"
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: https://gitlab.cern.ch/pre-commit-hook-mirrors/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format
        # --quiet hides ruff's spurious "COM812 may conflict with the
        # formatter" warning. In our hook order COM812 runs in
        # ruff-check first to add commas, and the formatter then
        # preserves them via magic-trailing-comma -- no actual conflict.
        args: ["--quiet"]
